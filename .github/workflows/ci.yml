name: CI
# Linux-only project: CI runs exclusively on Ubuntu.

on:
  push:
    branches: [main, tests]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  check-test-clippy:
    name: ubuntu / stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Verify lockfile matches manifest
        run: cargo update -w --locked

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test -- --test-threads=1 --nocapture

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  test-release:
    name: Test release profile (LTO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --release
        run: cargo test --release -- --test-threads=1

  test-no-default-features:
    name: Test without default features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --no-default-features
        run: cargo test --no-default-features -- --test-threads=1

  test-multi-thread:
    name: Test multi-threaded (may expose flaky concurrency bugs)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test (multi-threaded)
        run: cargo test -- --test-threads=$(nproc)

  sanitizer:
    name: ThreadSanitizer (nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: cargo test with ThreadSanitizer
        env:
          RUSTFLAGS: "-Z sanitizer=thread"
        run: cargo test --target x86_64-unknown-linux-gnu -- --test-threads=1

  doc:
    name: Documentation check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo doc
        run: cargo doc --no-deps

  musl-build:
    name: Build check for musl target
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: cargo check (musl)
        run: cargo check --target x86_64-unknown-linux-musl --all-targets

  smoke:
    name: Smoke test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build release binary
        run: cargo build --release

      - name: Run smoke-search-syntax.sh
        run: |
          mkdir -p /tmp/fd-rdd-smoke-root /tmp/fd-rdd-smoke-data
          ./target/release/fd-rdd \
            --root /tmp/fd-rdd-smoke-root \
            --snapshot-path /tmp/fd-rdd-smoke-data/index.db \
            --http-port 6060 \
            --snapshot-interval-secs 0 \
            >/tmp/fd-rdd-daemon.log 2>&1 &
          DAEMON_PID=$!
          # Wait for HTTP ready
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:6060/status >/dev/null 2>&1; then
              echo "Daemon ready"
              break
            fi
            sleep 0.5
          done
          # Give watcher a moment to settle
          sleep 2
          ./scripts/smoke-search-syntax.sh \
            --root /tmp/fd-rdd-smoke-root \
            --cleanup \
            --timeout 30 \
            --base-url http://127.0.0.1:6060
          SMOKE_EXIT=$?
          kill $DAEMON_PID 2>/dev/null || true
          wait $DAEMON_PID 2>/dev/null || true
          if [[ $SMOKE_EXIT -ne 0 ]]; then
            echo "=== Daemon log (last 40 lines) ==="
            tail -40 /tmp/fd-rdd-daemon.log
          fi
          exit $SMOKE_EXIT

  compaction-correctness:
    name: Fast compaction correctness
    runs-on: ubuntu-latest
    env:
      FAST_COMPACTION: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --test p1_compaction_fast
        run: cargo test --test p1_compaction_fast -- --test-threads=1

  streaming-export-check:
    name: Streaming export byte-identical
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --test p1_streaming_export
        run: cargo test --test p1_streaming_export -- --test-threads=1

  visibility-latency:
    name: Visibility latency placeholder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --test p1_visibility_latency
        run: cargo test --test p1_visibility_latency -- --test-threads=1
